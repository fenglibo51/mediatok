version: '3.8'

services:
  mediatok:
    image: fenglibo51/mediatok:latest
    container_name: mediatok
    restart: unless-stopped
    # 强烈建议保持 0:0 权限，以确保内部 Node.js 具备解压和覆盖 OTA 热更新补丁的权限
    user: "0:0" 
    environment:
      # 可根据你所在的地区自行修改
      - TZ=Asia/Shanghai
    ports:
      # 冒号左侧可修改为你服务器/NAS上未被占用的端口
      - "8090:8090"
    volumes:
      # ⚠️ 必填项：映射前端数据卷，确保 OTA 热更新的界面文件在容器重启后不丢失
      - ./data/dist:/app/dist