version: '3.8'

services:
  media-tok:
    build: .                           # 🌟 核心：告诉 Compose 使用当前目录的 Dockerfile 现场打包
    container_name: media-tok          # 给容器起个帅气的名字，在 NAS 面板里一眼就能认出它
    restart: unless-stopped            # 🌟 NAS 必备：只要不是你手动停止，NAS 重启它也会跟着自动开机
    ports:
      - "19956:8090"                   # 🌟 关键修改：左边是你浏览器访问的端口，右边是 Node.js 管家的 8090 端口
    environment:
      - TZ=Asia/Shanghai               # 校准容器时区，避免日志时间错乱